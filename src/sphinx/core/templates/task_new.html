{% extends "base.html" %}
{% block title %}New Task{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Create Task</h2>
</div>

<div class="card" style="max-width:600px;">
  <form method="post" action="/ui/cases/{{ case_id }}/tasks/new">
    <div class="form-group">
      <label for="question">Investigation Question</label>
      <textarea id="question" name="question" rows="4" required
        placeholder="e.g. Identify all lateral movement activity in the network logs and correlate with Windows authentication events."></textarea>
    </div>
    <div class="form-group">
      <label for="max_steps">Max Steps (default: 15)</label>
      <input type="number" id="max_steps" name="max_steps" value="15" min="1" max="50" style="width:120px;">
    </div>
    <div class="flex gap-1">
      <button type="submit" class="btn btn-primary">Create &amp; Run</button>
      <a href="/ui/cases/{{ case_id }}/tasks" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
