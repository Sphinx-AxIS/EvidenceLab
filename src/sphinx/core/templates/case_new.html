{% extends "base.html" %}
{% block title %}New Case{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Create Case</h2>
</div>

<div class="card" style="max-width:500px;">
  <form method="post" action="/ui/cases/new">
    <div class="form-group">
      <label for="name">Case Name</label>
      <input type="text" id="name" name="name" required placeholder="e.g. Incident-2026-001">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Brief description of the investigation..."></textarea>
    </div>
    <div class="flex gap-1">
      <button type="submit" class="btn btn-primary">Create Case</button>
      <a href="/ui/cases" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
